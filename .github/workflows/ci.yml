name: CI

on:
  push:
    branches: [ pageObject ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      app:
        image: jaktestowac/rolnopol:latest
        ports:
          - 3000:3000
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '24'
    - run: npm ci
    - run: npx playwright install --with-deps
    - run: npx playwright test